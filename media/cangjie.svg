<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cangjieGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7931E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="48" fill="url(#cangjieGrad)"/>
  
  <!-- 仓颉文字 - 使用简化的汉字风格 -->
  <text x="50" y="65" 
        font-family="Microsoft YaHei, SimHei, sans-serif" 
        font-size="42" 
        font-weight="bold"
        fill="white" 
        text-anchor="middle"
        stroke="#FFFFFF"
        stroke-width="1.5">
    仓
  </text>
  
  <!-- 装饰性元素 - 代表代码的符号 -->
  <text x="75" y="30" 
        font-family="Consolas, monospace" 
        font-size="16" 
        fill="white" 
        opacity="0.8">
    {'>'}
  </text>
</svg>
